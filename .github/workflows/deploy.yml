name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: nr1-back
  SERVICE_NAME: nr1-back-api
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required GitHub Variables
        run: |
          missing=""
          [ -z "${{ vars.DB_HOST }}" ] && missing="$missing DB_HOST"
          [ -z "${{ vars.DB_PORT }}" ] && missing="$missing DB_PORT"
          [ -z "${{ vars.DB_USER }}" ] && missing="$missing DB_USER"
          [ -z "${{ vars.DB_NAME }}" ] && missing="$missing DB_NAME"
          [ -z "${{ vars.DB_SSLMODE }}" ] && missing="$missing DB_SSLMODE"
          [ -z "${{ vars.GCS_BUCKET_NAME }}" ] && missing="$missing GCS_BUCKET_NAME"
          [ -z "${{ vars.SMTP_HOST }}" ] && missing="$missing SMTP_HOST"
          [ -z "${{ vars.SMTP_PORT }}" ] && missing="$missing SMTP_PORT"
          [ -z "${{ vars.SMTP_USER }}" ] && missing="$missing SMTP_USER"
          [ -z "${{ vars.SMTP_FROM_EMAIL }}" ] && missing="$missing SMTP_FROM_EMAIL"
          [ -z "${{ vars.SMTP_FROM_NAME }}" ] && missing="$missing SMTP_FROM_NAME"
          [ -z "${{ vars.FRONTEND_URL }}" ] && missing="$missing FRONTEND_URL"
          [ -z "${{ vars.TWILIO_FROM }}" ] && missing="$missing TWILIO_FROM"
          if [ -n "$missing" ]; then
            echo "Missing required GitHub Variables:$missing"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Validate required secrets exist in Secret Manager
        run: |
          gcloud secrets describe nr1-back-db-password --project "${{ env.PROJECT_ID }}" >/dev/null
          gcloud secrets describe nr1-back-jwt-secret --project "${{ env.PROJECT_ID }}" >/dev/null
          gcloud secrets describe nr1-back-smtp-password --project "${{ env.PROJECT_ID }}" >/dev/null
          gcloud secrets describe nr1-back-twilio-sid --project "${{ env.PROJECT_ID }}" >/dev/null
          gcloud secrets describe nr1-back-twilio-token --project "${{ env.PROJECT_ID }}" >/dev/null

      - name: Build Docker image
        run: |
          docker build --no-cache -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/nr1-back-docker/${{ env.SERVICE_NAME }}:${{ github.sha }} .
          docker tag us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/nr1-back-docker/${{ env.SERVICE_NAME }}:${{ github.sha }} us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/nr1-back-docker/${{ env.SERVICE_NAME }}:latest

      - name: Push Docker image to Artifact Registry
        run: |
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/nr1-back-docker/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/nr1-back-docker/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/nr1-back-docker/${{ env.SERVICE_NAME }}:latest \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --max-instances 10 \
            --timeout 300 \
            --update-env-vars PORT=8080,SERVER_PORT=8080,ENV=production,LOG_LEVEL=info,DB_HOST=${{ vars.DB_HOST }},DB_PORT=${{ vars.DB_PORT }},DB_USER=${{ vars.DB_USER }},DB_NAME=${{ vars.DB_NAME }},DB_SSLMODE=${{ vars.DB_SSLMODE }},GCS_BUCKET_NAME=${{ vars.GCS_BUCKET_NAME }},SMTP_HOST=${{ vars.SMTP_HOST }},SMTP_PORT=${{ vars.SMTP_PORT }},SMTP_USER=${{ vars.SMTP_USER }},SMTP_FROM_EMAIL=${{ vars.SMTP_FROM_EMAIL }},SMTP_FROM_NAME="${{ vars.SMTP_FROM_NAME }}",FRONTEND_URL=${{ vars.FRONTEND_URL }},TWILIO_FROM=${{ vars.TWILIO_FROM }} \
            --update-secrets DB_PASSWORD=nr1-back-db-password:latest,JWT_SECRET=nr1-back-jwt-secret:latest,SMTP_PASSWORD=nr1-back-smtp-password:latest,TWILIO_ACCOUNT_SID=nr1-back-twilio-sid:latest,TWILIO_AUTH_TOKEN=nr1-back-twilio-token:latest

      - name: Get Cloud Run URL
        id: deploy_url
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --format 'value(status.url)')
          echo "url=$SERVICE_URL" >> $GITHUB_OUTPUT
          echo "Service deployed at: $SERVICE_URL"

      - name: Deployment Summary
        run: |
          echo "=========================================="
          echo "Deployment Complete!"
          echo "=========================================="
          echo "Service: ${{ env.SERVICE_NAME }}"
          echo "Region: ${{ env.REGION }}"
          echo "Image: gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          echo "URL: ${{ steps.deploy_url.outputs.url }}"
          echo "=========================================="
